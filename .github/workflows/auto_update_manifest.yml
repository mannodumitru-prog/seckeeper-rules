name: Auto Update Manifest

on:
  # 保持原有的手动提交触发
  push:
    branches: [ main ]
    paths: [ '**.json', '!manifest.json' ]
    
  # 新增：每日北京时间凌晨 03:00 自动检查（Cron 使用 UTC 时间，03:00 对应 UTC 19:00）
  schedule:
    - cron: '0 19 * * *' 
  
  # 新增：允许在 GitHub 网页手动点按钮触发
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 新增：运行情报获取脚本 (确保 OSV 抓取逻辑在这里执行)
      - name: Fetch New Vulnerabilities
        run: |
          python3 utils/osv_fetcher.py 

      - name: Run Build Script
        run: python3 build_repo.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "chore: 🤖 每日情报自动更新 [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "当前情报源无更新，跳过同步。"
          fi
