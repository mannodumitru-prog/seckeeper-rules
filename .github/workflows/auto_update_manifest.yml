name: SecKeeper Production Pipeline

on:
  push:
    branches: [ main ]
    paths: [ '**.json', '!manifest.json' ]
  schedule:
    - cron: '30 19 * * *' # 每日 UTC 19:30 (北京时间 03:30)
  workflow_dispatch:

jobs:
  production-factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cvss

      - name: Fetch & Build Intelligence
        run: |
          # 1. 先抓取最新情报
          python3 utils/osv_fetcher.py
          # 2. 再进行熔炼构建
          python3 build_repo.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 检查是否有变更
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "chore: 🤖 SecKeeper 情报流水线自动更新 [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "情报无变动，跳过同步。"
          fi
