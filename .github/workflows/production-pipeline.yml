name: SecKeeper Production Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - '**.json'       # 规则源变动
      - 'pocs/**.py'    # 探测探针变动
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  production-factory:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cvss

      - name: Fetch & Build Intelligence
        run: |
          # 1. OSV 情报抓取逻辑保持不变
          python3 utils/osv_fetcher.py
          # 2. 规则熔炼逻辑
          python3 build_repo.py
          # 3. 新增：自动计算并同步 PoC 指纹
          python3 update_manifest.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 检查清单或数据是否有变动
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "chore: 🤖 自动化生产：同步情报规则与 PoC 指纹 [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "无变更，跳过同步。"
          fi
