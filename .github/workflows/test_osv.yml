name: Test OSV Fetcher

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cvss

      - name: Run Engine & Update Manifest
        run: |
          python build_repo.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cve_rules.json manifest.json
          git commit -m "chore: 🤖 自动同步最新高危漏洞规则库 [skip ci]" || exit 0
          git push
